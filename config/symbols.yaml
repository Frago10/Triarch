# ─────────────────────────────────────────────────────────
# Triarch — symbols configuration
#
# OJO: el "name" exacto del símbolo varía por broker.
#   - IC Markets:  NAS100 / XAUUSD / EURUSD
#   - Pepperstone: NAS100 / XAUUSD / EURUSD
#   - XM:          US100  / GOLD   / EURUSD
#   - Exness:      USTEC  / XAUUSD / EURUSD
# Ajusta "broker_symbol" según tu broker. Si fetch_history dice que un símbolo
# no existe, corre `python -m scripts.diagnose_mt5` para ver los nombres reales.
#
# Campos:
#   profile          → "quality" | "scalper" | "balanced"
#   take_trades      → si false → fuerza SIGNAL_ONLY a runtime (toggle dashboard)
#   target_trades_wk → objetivo trades/semana (referencia, no es filtro hard)
#   confluence       → override por activo. scalper permisivo, quality exigente.
#                      Si se omite → usa defaults globales del .env.
# ─────────────────────────────────────────────────────────

NAS100:
  broker_symbol: NDAQ           # MetaQuotes-Demo lo llama NDAQ
  description: Nasdaq 100 CFD
  family: index
  timeframe: M15
  mode: SIGNAL_ONLY
  take_trades: false
  profile: balanced
  target_trades_wk: 8
  session_utc:
    start: "13:30"
    end: "17:00"
  risk:
    max_daily_loss_pct: 2.0
    max_consec_losses: 3
    max_trades_per_day: 5
    min_rr_ratio: 1.5
  position_sizing:
    method: risk_pct
    risk_per_trade_pct: 0.5
    min_lot: 0.10
    max_lot: 5.0
  confluence:
    min_signals: 2
    min_families: 2
    min_combined_score: 1.0
  strategies:
    - ORB
    - VWAP_MR
    - EMA_MOMENTUM

# ─────────────────────────────────────────────────────────
# XAUUSD — perfil "calidad"  (config tras backtest del 2026-05-14)
#
# HALLAZGO DEL BACKTEST (1 año real, M30):
#   Probé ORB / EMA_MOMENTUM / BB_MR / VWAP_MR solas y combinadas.
#     · ORB sola         → PIERDE plata (PF 0.92). Demasiados falsos breakouts.
#     · BB_MR sola       → marginal (PF 1.10).
#     · EMA_MOMENTUM sola→ PF 1.51, E +0.30R/trade, DD 7R  ← LA MEJOR
#     · Combinarlas BAJA el PF (la confluencia elige a veces la peor señal).
#   → Conclusión: para oro, EMA_MOMENTUM sola es el edge. Añadir estrategias
#     no ayudó, lo empeoró. Datos > intuición.
#
# Sobre el win rate: las estrategias de momentum tienen techo ~40-44% de WR.
# 50-60% WR + RR 1:2-1:3 a la vez NO existe en trading sistemático real
# (sería un PF de 2.5-4.5). EMA_MOMENTUM a 41% WR con RR 2.2 da PF 1.51,
# que es un sistema sólido. Si se quisiera 55%+ WR habría que aceptar RR ~1:1.
#
# min_rr_ratio 2.2 → TP1 a 2.2R (dentro del rango 1:2 deseado).
# Confluencia 1/1 porque solo hay 1 estrategia activa.
# TF M30. Cap duro 2 trades/día → ~2.6/semana en backtest.
# ─────────────────────────────────────────────────────────
XAUUSD:
  broker_symbol: XAUUSD
  description: Gold spot (oro) — quality profile
  family: commodity
  timeframe: M30
  mode: SIGNAL_ONLY
  take_trades: false
  profile: quality
  target_trades_wk: 3
  session_utc:
    start: "12:00"
    end: "17:00"
  risk:
    max_daily_loss_pct: 1.5
    max_consec_losses: 2
    max_trades_per_day: 2               # cap duro → ~2-3/semana
    min_rr_ratio: 2.2                   # TP1 a 2.2R (backtest: PF 1.51)
  position_sizing:
    method: risk_pct
    risk_per_trade_pct: 0.75
    min_lot: 0.01
    max_lot: 2.0
  confluence:
    min_signals: 1                      # solo 1 estrategia activa
    min_families: 1
    min_combined_score: 0.0
  strategies:
    - EMA_MOMENTUM                      # familia: trend — la única rentable en oro
  # Disponibles si se quiere experimentar (en backtest no mejoraron):
  #   - ORB        (familia opening) — perdía plata sola en oro
  #   - BB_MR      (familia mean)    — marginal
  #   - VWAP_MR    (familia mean)

# ─────────────────────────────────────────────────────────
# EURUSD — perfil "scalper puro"
#
# El par más líquido del mundo: spread bajísimo → ideal para scalping.
# El nombre del símbolo casi siempre es "EURUSD" exacto, pero si fetch_history
# avisa que no existe, corre `python -m scripts.diagnose_mt5` y ajusta abajo.
#
# VALIDACIÓN DE LA LÓGICA (sobre M5 sintético):
#   El SCALPER produce trades correctamente. En data aleatoria da ~breakeven
#   (lo esperado); en data real, con microestructura explotable, debería
#   rendir mejor. El filtro `ema_sep_min` del SCALPER solo opera con tendencia
#   corta clara → sube la calidad de los setups (y el win rate).
#
# Confluencia PERMISIVA (1 señal basta) — un scalper no puede esperar a que
# 2 estrategias coincidan en la misma vela M5.
# min_rr_ratio 0.8 → SCALPER opera con RR ~0.85. Para ser rentable necesita
# WR > ~54%. El filtro de tendencia apunta a eso.
# ─────────────────────────────────────────────────────────
EURUSD:
  broker_symbol: EURUSD                 # casi siempre "EURUSD" exacto; verificar si falla
  description: EUR/USD spot — scalper profile
  family: fx
  timeframe: M5
  mode: SIGNAL_ONLY
  take_trades: false
  profile: scalper
  target_trades_wk: 30
  # Sesión fuerte de EURUSD: apertura de Londres + solape con NY = 07:00-16:00 UTC
  session_utc:
    start: "07:00"
    end: "16:00"
  risk:
    max_daily_loss_pct: 1.5
    max_consec_losses: 5                # scalper aguanta más rachas intradía
    max_trades_per_day: 8               # objetivo ~30/semana (~5 días hábiles)
    min_rr_ratio: 0.8                   # scalper: RR bajo a propósito, WR alto compensa
  position_sizing:
    method: risk_pct
    risk_per_trade_pct: 0.25            # riesgo chico por trade, mucho volumen
    min_lot: 0.01
    max_lot: 3.0
  confluence:
    min_signals: 1                      # permisivo: 1 estrategia basta
    min_families: 1
    min_combined_score: 0.0
  strategies:
    - SCALPER                           # familia: trend  (gatillo principal)
    - BB_MR                             # familia: mean   (scalps de reversión)
